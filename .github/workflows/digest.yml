name: Daily Trades Digest

# Runs every morning. GitHub cron is in UTC.
# 11:00 UTC = 7:00 AM US Eastern (EDT). Adjust if you want a different time.
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Needs write permission so it can commit digest.db back to the repo,
# preserving dedup history + backtest outcomes between runs.
permissions:
  contents: write

# Prevent a scheduled run from colliding with a manual run on the same branch
# (both push digest.db; the second push would fail).
concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secret integrity (temporary)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EDGAR_UA: ${{ secrets.EDGAR_UA }}
        run: |
          python - <<'PY'
          import os, hashlib
          for k in ("RESEND_API_KEY", "EDGAR_UA"):
              v = os.environ.get(k, "")
              h = hashlib.sha256(v.encode()).hexdigest()[:12]
              # Reveals length + any leading/trailing whitespace without leaking value.
              print(f"{k}: len={len(v)} sha256_12={h} startswith_re={v[:3]!r} endswith={v[-3:]!r} has_newline={chr(10) in v} has_cr={chr(13) in v}")
          # Also: live curl to Resend from the runner using the same env var.
          import urllib.request, json
          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=json.dumps({"from":"onboarding@resend.dev","to":["doughnut23456@gmail.com"],"subject":"debug","text":"hi"}).encode(),
              headers={"Authorization": f"Bearer {os.environ['RESEND_API_KEY']}", "Content-Type":"application/json"},
              method="POST")
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              print("resend_curl_status:", resp.status, resp.read()[:200])
          except urllib.error.HTTPError as e:
              print("resend_curl_status:", e.code, e.read()[:300])
          PY

      - name: Run digest
        env:
          # These come from repo Settings -> Secrets and variables -> Actions.
          # Any left unset just disables that feature (tool still runs).
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_FROM_NUMBER: ${{ secrets.TELNYX_FROM_NUMBER }}
          TELNYX_TO_NUMBER: ${{ secrets.TELNYX_TO_NUMBER }}
          EDGAR_UA: ${{ secrets.EDGAR_UA }}
        run: python run.py

      - name: Upload digest as artifact (debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Persist database (dedup history + backtest)
        run: |
          git config user.name  "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add -f digest.db
          # Only commit if the DB actually changed, to avoid empty commits.
          if git diff --staged --quiet; then
            echo "no DB changes to commit"
            exit 0
          fi
          git commit -m "digest run $(date -u +%F)"
          # Rebase any commits made since checkout (rare, but possible if a
          # manual + scheduled run race past the concurrency gate).
          git pull --rebase origin main || true
          git push
